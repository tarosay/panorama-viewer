<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>360 Panorama Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #info {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0,0,0,0.45);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      user-select: none;
    }

    #embedBox {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.70);
      color: #fff;
      border-radius: 10px;
      padding: 12px;
      box-sizing: border-box;
    }

    #embedBoxHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    #embedTitle {
      font-size: 14px;
      font-weight: bold;
    }

    #copyBtn {
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    #embedCode {
      width: 100%;
      min-height: 88px;
      resize: vertical;
      box-sizing: border-box;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.4;
      background: #111;
      color: #fff;
    }

    #fallback {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: #111;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
      z-index: 20;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="info">ドラッグ: 回転 / ホイール: 拡大縮小</div>

  <div id="embedBox">
    <div id="embedBoxHeader">
      <div id="embedTitle">埋め込み用 iframe タグ</div>
      <button id="copyBtn" type="button">コピー</button>
    </div>
    <textarea id="embedCode" readonly></textarea>
  </div>

  <div id="fallback">WebGL初期化に失敗しました。</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const fallback = document.getElementById("fallback");
    const embedCode = document.getElementById("embedCode");
    const copyBtn = document.getElementById("copyBtn");

    let scene, camera, renderer, mesh;
    let lon = 0;
    let lat = 0;
    let isUserInteracting = false;
    let onPointerDownPointerX = 0;
    let onPointerDownPointerY = 0;
    let onPointerDownLon = 0;
    let onPointerDownLat = 0;
    let fov = 75;

    init();
    setEmbedCode();
    animate();

    function init() {
      try {
        scene = new THREE.Scene();

        camera = new THREE.PerspectiveCamera(
          fov,
          window.innerWidth / window.innerHeight,
          1,
          1100
        );

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.SphereGeometry(500, 60, 40);
        geometry.scale(-1, 1, 1);

        const textureLoader = new THREE.TextureLoader();
        const texture = textureLoader.load(
          "./pano.jpg",
          () => {
            console.log("pano.jpg loaded");
          },
          undefined,
          (err) => {
            fallback.style.display = "flex";
            fallback.textContent = "pano.jpg の読み込みに失敗しました。index.html と同じ場所に pano.jpg を置いてください。";
            console.error(err);
          }
        );

        const material = new THREE.MeshBasicMaterial({ map: texture });
        mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        document.addEventListener("pointerdown", onPointerDown);
        document.addEventListener("pointermove", onPointerMove);
        document.addEventListener("pointerup", onPointerUp);
        document.addEventListener("wheel", onDocumentMouseWheel, { passive: false });
        window.addEventListener("resize", onWindowResize);

        copyBtn.addEventListener("click", copyEmbedCode);
      } catch (e) {
        fallback.style.display = "flex";
        fallback.textContent = "初期化に失敗しました。";
        console.error(e);
      }
    }

    function setEmbedCode() {
      const src = window.location.href;
      const iframeTag =
`<iframe
  src="${src}"
  width="100%"
  height="600"
  style="border:none;"
  allowfullscreen
  loading="lazy">
</iframe>`;

      embedCode.value = iframeTag;
    }

    async function copyEmbedCode() {
      try {
        await navigator.clipboard.writeText(embedCode.value);
        copyBtn.textContent = "コピー済み";
        setTimeout(() => {
          copyBtn.textContent = "コピー";
        }, 1500);
      } catch (e) {
        embedCode.select();
        document.execCommand("copy");
        copyBtn.textContent = "コピー済み";
        setTimeout(() => {
          copyBtn.textContent = "コピー";
        }, 1500);
      }
    }

    function onPointerDown(event) {
      isUserInteracting = true;
      onPointerDownPointerX = event.clientX;
      onPointerDownPointerY = event.clientY;
      onPointerDownLon = lon;
      onPointerDownLat = lat;
    }

    function onPointerMove(event) {
      if (!isUserInteracting) return;
      lon = (onPointerDownPointerX - event.clientX) * 0.12 + onPointerDownLon;
      lat = (event.clientY - onPointerDownPointerY) * 0.12 + onPointerDownLat;
    }

    function onPointerUp() {
      isUserInteracting = false;
    }

    function onDocumentMouseWheel(event) {
      event.preventDefault();
      fov += event.deltaY * 0.03;
      fov = Math.max(30, Math.min(100, fov));
      camera.fov = fov;
      camera.updateProjectionMatrix();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      setEmbedCode();
    }

    function animate() {
      requestAnimationFrame(animate);
      update();
    }

    function update() {
      lat = Math.max(-85, Math.min(85, lat));
      const phi = THREE.MathUtils.degToRad(90 - lat);
      const theta = THREE.MathUtils.degToRad(lon);

      const x = 500 * Math.sin(phi) * Math.cos(theta);
      const y = 500 * Math.cos(phi);
      const z = 500 * Math.sin(phi) * Math.sin(theta);

      camera.lookAt(x, y, z);
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
