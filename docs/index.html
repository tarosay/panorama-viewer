<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Panorama Viewer Embed</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      color: #fff;
      font-family: sans-serif;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 40px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.3;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.6;
    }

    .section {
      margin-top: 24px;
      padding: 16px;
      background: #1c1c1c;
      border-radius: 12px;
    }

    .label {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .urlbox,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      background: #0d0d0d;
      color: #fff;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      font-family: monospace;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button,
    a.button {
      appearance: none;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      background: #fff;
      color: #000;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .preview {
      margin-top: 24px;
    }

    iframe.preview-frame {
      width: 100%;
      height: 420px;
      border: none;
      border-radius: 12px;
      background: #000;
    }

    .note {
      font-size: 13px;
      opacity: 0.85;
    }

    .local-link {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.72;
    }

    .local-link a {
      color: rgba(255, 255, 255, 0.78);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.22);
    }

    .local-link a:hover {
      color: #fff;
      border-bottom-color: rgba(255, 255, 255, 0.55);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>360°パノラマビューア</h1>
    <p>
      このページは埋め込み用コードの案内ページです。<br>
      実際に iframe で埋め込む先は <code>viewer.html</code> です。
    </p>
    <p class="local-link">
      ローカル画像を試す場合は <a href="./local-viewer.html" target="_blank" rel="noopener noreferrer">ローカルビューア</a>
    </p>

    <div class="section">
      <div class="label">埋め込み先URL</div>
      <input id="viewerUrl" class="urlbox" type="text" readonly />
      <div class="buttons">
        <button id="copyUrlBtn" type="button">URLをコピー</button>
        <a id="openViewerLink" class="button" href="#" target="_blank" rel="noopener noreferrer">viewer.html を開く</a>
      </div>
    </div>

    <div class="section">
      <div class="label">iframe 埋め込みコード</div>
      <textarea id="embedCode" readonly></textarea>
      <div class="buttons">
        <button id="copyCodeBtn" type="button">iframeコードをコピー</button>
      </div>
      <p class="note" style="margin-top:12px;">
        Canva 側で URL だけを要求される場合は、上の「埋め込み先URL」を使ってください。
      </p>
    </div>

    <div class="section preview">
      <div class="label">プレビュー</div>
      <iframe id="previewFrame" class="preview-frame" loading="lazy"></iframe>
    </div>
  </div>

  <script>
    const viewerUrlInput = document.getElementById("viewerUrl");
    const embedCode = document.getElementById("embedCode");
    const copyUrlBtn = document.getElementById("copyUrlBtn");
    const copyCodeBtn = document.getElementById("copyCodeBtn");
    const openViewerLink = document.getElementById("openViewerLink");
    const previewFrame = document.getElementById("previewFrame");

    function getViewerUrl() {
      const url = new URL(window.location.href);
      url.pathname = url.pathname.replace(/\/index\.html$/, "/");
      if (!url.pathname.endsWith("/")) {
        url.pathname += "/";
      }
      url.pathname += "viewer.html";
      url.search = "";
      url.hash = "";
      return url.toString();
    }

    function buildIframeCode(src) {
      return `<iframe
  src="${src}"
  width="100%"
  height="600"
  style="border:none;"
  allowfullscreen
  loading="lazy">
</iframe>`;
    }

    async function copyText(text, button) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (e) {
        const temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
      }

      const old = button.textContent;
      button.textContent = "コピー済み";
      setTimeout(() => {
        button.textContent = old;
      }, 1500);
    }

    const viewerUrl = getViewerUrl();
    const iframeCode = buildIframeCode(viewerUrl);

    viewerUrlInput.value = viewerUrl;
    embedCode.value = iframeCode;
    openViewerLink.href = viewerUrl;
    previewFrame.src = viewerUrl;

    copyUrlBtn.addEventListener("click", () => copyText(viewerUrl, copyUrlBtn));
    copyCodeBtn.addEventListener("click", () => copyText(iframeCode, copyCodeBtn));
  </script>
</body>
</html>
