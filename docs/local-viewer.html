<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ローカル画像 360°ビューア</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
      color: #fff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .panel {
      background: rgba(0, 0, 0, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 12px;
      padding: 10px 12px;
      backdrop-filter: blur(8px);
    }

    .floating-panel {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 22;
      min-width: min(100vw - 24px, 360px);
      max-width: min(100vw - 24px, 420px);
      touch-action: none;
    }

    .panel-handle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: -2px -2px 8px;
      padding: 4px 2px 6px;
      cursor: move;
      user-select: none;
      font-size: 13px;
      opacity: 0.92;
    }

    .panel-handle::before {
      content: "";
      width: 26px;
      height: 26px;
      flex: 0 0 26px;
      border-radius: 7px;
      opacity: 1;
      background-color: rgba(255,255,255,0.16);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 26 26'><g fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M13 3v20M3 13h20'/><path d='M13 3l-3 3M13 3l3 3M13 23l-3-3M13 23l3-3M3 13l3-3M3 13l3 3M23 13l-3-3M23 13l-3 3'/></g><circle cx='13' cy='13' r='1.7' fill='white'/></svg>");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 18px 18px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.28),
        0 0 0 1px rgba(0,0,0,0.22);
    }

    .panel-handle::after {
      content: "ドラッグで移動";
      font-size: 12px;
      opacity: 0.9;
    }

    .hint {
      font-size: 14px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .export-panel {
      min-width: min(100%, 360px);
    }

    .export-grid {
      display: grid;
      grid-template-columns: auto 112px;
      gap: 8px 10px;
      align-items: center;
      margin-top: 8px;
    }

    .export-grid label,
    .meta-line {
      font-size: 13px;
      line-height: 1.4;
    }

    .export-grid input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 14px;
    }

    .export-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .export-note {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.85;
      line-height: 1.5;
    }

    .toggle-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.4;
      user-select: none;
    }

    .toggle-line input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: #fff;
    }

    button, .file-label {
      appearance: none;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      background: #fff;
      color: #000;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    input[type="file"] {
      display: none;
    }

    #dropZone {
      position: fixed;
      inset: 0;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    #dropZone.active {
      opacity: 1;
      pointer-events: none;
    }

    #dropInner {
      width: min(640px, calc(100vw - 40px));
      padding: 28px;
      border: 2px dashed rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      text-align: center;
      box-sizing: border-box;
    }

    #message {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 20;
      max-width: min(820px, calc(100vw - 24px));
      background: rgba(0, 0, 0, 0.36);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.5;
      backdrop-filter: blur(8px);
      white-space: pre-line;
    }

    #fallback {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: #111;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
      z-index: 30;
    }

    #cropOverlay {
      position: fixed;
      inset: 0;
      z-index: 12;
      pointer-events: none;
    }

    #cropFrame {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255, 255, 255, 0.92);
      box-sizing: border-box;
      box-shadow: 0 0 0 99999px rgba(0, 0, 0, 0.28);
      pointer-events: auto;
    }

    #cropFrame::before,
    #cropFrame::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.92);
    }

    #cropFrame::before {
      left: 50%;
      top: 0;
      width: 1px;
      height: 100%;
      transform: translateX(-50%);
    }

    #cropFrame::after {
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
      transform: translateY(-50%);
    }

    #cropLabel {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, calc(-50% - 12px));
      margin-top: calc(-1 * var(--frame-half-height, 0px));
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
      pointer-events: none;
    }

    .crop-handle {
      position: absolute;
      pointer-events: auto;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.96);
      background: rgba(0, 0, 0, 0.72);
      border-radius: 3px;
      box-sizing: border-box;
    }

    .crop-handle.nw,
    .crop-handle.se {
      cursor: nwse-resize;
    }

    .crop-handle.ne,
    .crop-handle.sw {
      cursor: nesw-resize;
    }

    .crop-handle.nw { left: -8px; top: -8px; }
    .crop-handle.ne { right: -8px; top: -8px; }
    .crop-handle.sw { left: -8px; bottom: -8px; }
    .crop-handle.se { right: -8px; bottom: -8px; }

    canvas { display: block; }

    @media (max-width: 640px) {
      #ui {
        left: 8px;
        right: 8px;
        top: 8px;
      }
      .panel {
        padding: 9px 10px;
      }
      .hint {
        font-size: 13px;
      }
      button, .file-label {
        font-size: 13px;
        padding: 9px 12px;
      }
      .export-grid {
        grid-template-columns: 1fr 96px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="cropOverlay">
    <div id="cropFrame">
      <div class="crop-handle nw" data-handle="nw"></div>
      <div class="crop-handle ne" data-handle="ne"></div>
      <div class="crop-handle sw" data-handle="sw"></div>
      <div class="crop-handle se" data-handle="se"></div>
    </div>
    <div id="cropLabel"></div>
  </div>

  <div id="ui">
    <div class="panel actions">
      <label class="file-label" for="fileInput">画像を選択</label>
      <input id="fileInput" type="file" accept="image/*" />
      <button id="sampleBtn" class="secondary" type="button">サンプルに戻す</button>
    </div>

    <div id="exportPanel" class="panel export-panel floating-panel">
      <div id="exportPanelHandle" class="panel-handle">
        <div class="meta-line">現在向いている方向を PNG で保存</div>
      </div>
      <div class="export-grid">
        <label for="hFovInput">水平画角 (度)</label>
        <input id="hFovInput" type="number" min="1" max="179" step="1" value="90" />
        <label for="vFovInput">垂直画角 (度)</label>
        <input id="vFovInput" type="number" min="1" max="179" step="1" value="90" />
      </div>
      <div id="exportSize" class="export-note">保存サイズ: -</div>
      <label class="toggle-line"><input id="showFrameInput" type="checkbox" checked /> 白枠を表示</label>
      <div class="export-actions">
        <button id="savePngBtn" type="button">PNG保存</button>
        <button id="saveCubeBtn" class="secondary" type="button">Cube-map保存</button>
        <button id="saveCubeCrossBtn" class="secondary" type="button">Cube-map展開図保存</button>
      </div>
      <div class="export-note">保存サイズは元画像の画素密度から自動計算します。現在の向きのまま切り出します。</div>
    </div>

    <div class="panel hint">ドラッグ: 回転 / ホイール: 拡大縮小 / 画像をドラッグ&ドロップ可能</div>
  </div>

  <div id="dropZone">
    <div id="dropInner">
      <h2 style="margin:0 0 10px; font-size: 24px;">ここに正距円筒画像をドロップ</h2>
      <p style="margin:0; line-height:1.7; opacity:0.9;">JPEG / PNG / WebP などを読み込めます。<br>ローカル画像なのでサーバーへ送信されません。</p>
    </div>
  </div>

  <div id="message">現在の画像: サンプル（pano.jpg）</div>
  <div id="fallback">WebGL初期化に失敗しました。</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const app = document.getElementById("app");
    const fallback = document.getElementById("fallback");
    const fileInput = document.getElementById("fileInput");
    const sampleBtn = document.getElementById("sampleBtn");
    const dropZone = document.getElementById("dropZone");
    const message = document.getElementById("message");
    const hFovInput = document.getElementById("hFovInput");
    const vFovInput = document.getElementById("vFovInput");
    const exportSize = document.getElementById("exportSize");
    const showFrameInput = document.getElementById("showFrameInput");
    const savePngBtn = document.getElementById("savePngBtn");
    const saveCubeBtn = document.getElementById("saveCubeBtn");
    const saveCubeCrossBtn = document.getElementById("saveCubeCrossBtn");
    const cropOverlay = document.getElementById("cropOverlay");
    const cropFrame = document.getElementById("cropFrame");
    const cropLabel = document.getElementById("cropLabel");
    const exportPanel = document.getElementById("exportPanel");
    const exportPanelHandle = document.getElementById("exportPanelHandle");

    let scene, camera, renderer, mesh, material;
    let lon = 0;
    let lat = 0;
    let isUserInteracting = false;
    let onPointerDownPointerX = 0;
    let onPointerDownPointerY = 0;
    let onPointerDownLon = 0;
    let onPointerDownLat = 0;
    let fov = 115;
    let dragDepth = 0;
    let currentImageLabel = "サンプル（pano.jpg）";
    let currentImageWidth = 0;
    let currentImageHeight = 0;
    let panelDragging = false;
    let panelDragOffsetX = 0;
    let panelDragOffsetY = 0;
    let frameResizing = false;

    init();
    animate();
    loadTexture("./pano.jpg", "サンプル（pano.jpg）");

    function init() {
      try {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(fov, window.innerWidth / window.innerHeight, 1, 1100);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        app.appendChild(renderer.domElement);

        const geometry = new THREE.SphereGeometry(500, 60, 40);
        geometry.scale(-1, 1, 1);
        material = new THREE.MeshBasicMaterial({ color: 0xffffff });
        mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        document.addEventListener("pointerdown", onPointerDown);
        document.addEventListener("pointermove", onPointerMove);
        document.addEventListener("pointerup", onPointerUp);
        document.addEventListener("wheel", onDocumentMouseWheel, { passive: false });
        window.addEventListener("resize", onWindowResize);

        [hFovInput, vFovInput].forEach((input) => {
          input.addEventListener("wheel", onFovInputWheel, { passive: false });
          input.addEventListener("pointerdown", (event) => event.stopPropagation());
        });

        [fileInput, sampleBtn, savePngBtn, saveCubeBtn, saveCubeCrossBtn, showFrameInput].forEach((element) => {
          element.addEventListener("pointerdown", (event) => event.stopPropagation());
        });

        cropFrame.querySelectorAll('.crop-handle').forEach((handle) => {
          handle.addEventListener('pointerdown', onCropHandlePointerDown);
        });

        exportPanel.addEventListener("pointerdown", (event) => event.stopPropagation());
        exportPanelHandle.addEventListener("pointerdown", onExportPanelPointerDown);
        document.addEventListener("pointermove", onExportPanelPointerMove);
        document.addEventListener("pointerup", onExportPanelPointerUp);

        fileInput.addEventListener("change", (event) => {
          const file = event.target.files?.[0];
          if (file) {
            openFile(file);
          }
        });

        sampleBtn.addEventListener("click", () => {
          loadTexture("./pano.jpg", "サンプル（pano.jpg）");
          fileInput.value = "";
        });

        hFovInput.addEventListener("input", updateExportInfo);
        vFovInput.addEventListener("input", updateExportInfo);
        showFrameInput.addEventListener("change", updateCropFrameVisibility);
        savePngBtn.addEventListener("click", saveCurrentViewAsPng);
        saveCubeBtn.addEventListener("click", saveCubeMap);
        saveCubeCrossBtn.addEventListener("click", saveCubeCrossMap);

        ["dragenter", "dragover", "dragleave", "drop"].forEach((type) => {
          window.addEventListener(type, preventDefaults, false);
        });

        window.addEventListener("dragenter", () => {
          dragDepth += 1;
          dropZone.classList.add("active");
        });

        window.addEventListener("dragleave", () => {
          dragDepth = Math.max(0, dragDepth - 1);
          if (dragDepth === 0) {
            dropZone.classList.remove("active");
          }
        });

        window.addEventListener("drop", (event) => {
          dragDepth = 0;
          dropZone.classList.remove("active");
          const file = event.dataTransfer?.files?.[0];
          if (file) {
            openFile(file);
          }
        });
      } catch (error) {
        fallback.style.display = "flex";
        fallback.textContent = "初期化に失敗しました。";
        console.error(error);
      }
    }

    function preventDefaults(event) {
      event.preventDefault();
      event.stopPropagation();
    }

    function onPointerDown(event) {
      if (panelDragging || frameResizing) return;
      isUserInteracting = true;
      onPointerDownPointerX = event.clientX;
      onPointerDownPointerY = event.clientY;
      onPointerDownLon = lon;
      onPointerDownLat = lat;
    }

    function onPointerMove(event) {
      if (frameResizing) {
        updateFovFromFramePointer(event);
        return;
      }
      if (!isUserInteracting) return;
      lon = (onPointerDownPointerX - event.clientX) * 0.12 + onPointerDownLon;
      lat = (event.clientY - onPointerDownPointerY) * 0.12 + onPointerDownLat;
    }

    function onPointerUp() {
      isUserInteracting = false;
      frameResizing = false;
    }



    function onCropHandlePointerDown(event) {
      event.preventDefault();
      event.stopPropagation();
      frameResizing = true;
    }

    function updateFovFromFramePointer(event) {
      if (!camera) return;

      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      const frameWidth = clamp(Math.abs(event.clientX - centerX) * 2, 16, window.innerWidth);
      const frameHeight = clamp(Math.abs(event.clientY - centerY) * 2, 16, window.innerHeight);
      const currentHFov = getCurrentHorizontalFov();
      const currentVFov = fov;

      const nextHFov = framePixelsToFov(frameWidth, window.innerWidth, currentHFov);
      const nextVFov = framePixelsToFov(frameHeight, window.innerHeight, currentVFov);

      hFovInput.value = String(Math.round(clamp(nextHFov, 1, 179)));
      vFovInput.value = String(Math.round(clamp(nextVFov, 1, 179)));
      updateExportInfo();
    }

    function framePixelsToFov(framePixels, viewportPixels, baseFov) {
      const ratio = clamp(framePixels / Math.max(1, viewportPixels), 0.02, 1);
      const radians = 2 * Math.atan(ratio * Math.tan(THREE.MathUtils.degToRad(baseFov / 2)));
      return THREE.MathUtils.radToDeg(radians);
    }

    function onFovInputWheel(event) {
      event.preventDefault();
      event.stopPropagation();

      const input = event.currentTarget;
      const step = Number(input.step) || 1;
      const min = Number(input.min) || -Infinity;
      const max = Number(input.max) || Infinity;
      const direction = event.deltaY < 0 ? 1 : -1;
      const current = Number(input.value) || 0;
      const next = clamp(Number((current + direction * step).toFixed(4)), min, max);
      input.value = String(next);
      updateExportInfo();
    }

    function onExportPanelPointerDown(event) {
      event.preventDefault();
      event.stopPropagation();
      panelDragging = true;
      const rect = exportPanel.getBoundingClientRect();
      panelDragOffsetX = event.clientX - rect.left;
      panelDragOffsetY = event.clientY - rect.top;
      exportPanelHandle.setPointerCapture?.(event.pointerId);
    }

    function onExportPanelPointerMove(event) {
      if (!panelDragging) return;
      const maxLeft = Math.max(0, window.innerWidth - exportPanel.offsetWidth - 8);
      const maxTop = Math.max(0, window.innerHeight - exportPanel.offsetHeight - 8);
      const left = clamp(event.clientX - panelDragOffsetX, 8, maxLeft);
      const top = clamp(event.clientY - panelDragOffsetY, 8, maxTop);
      exportPanel.style.left = `${left}px`;
      exportPanel.style.top = `${top}px`;
      exportPanel.style.right = 'auto';
    }

    function onExportPanelPointerUp(event) {
      if (!panelDragging) return;
      panelDragging = false;
      exportPanelHandle.releasePointerCapture?.(event.pointerId);
    }

    function onDocumentMouseWheel(event) {
      if (event.target && (event.target.closest('#exportPanel') || event.target.closest('button') || event.target.closest('label'))) {
        return;
      }
      event.preventDefault();
      fov += event.deltaY * 0.03;
      fov = Math.max(30, Math.min(120, fov));
      camera.fov = fov;
      camera.updateProjectionMatrix();
      updateCropFrame();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      keepExportPanelInViewport();
      updateCropFrame();
    }


    function keepExportPanelInViewport() {
      const rect = exportPanel.getBoundingClientRect();
      let left = rect.left;
      let top = rect.top;
      let changed = false;

      if (rect.right > window.innerWidth - 8) {
        left = Math.max(8, window.innerWidth - exportPanel.offsetWidth - 8);
        changed = true;
      }
      if (rect.bottom > window.innerHeight - 8) {
        top = Math.max(8, window.innerHeight - exportPanel.offsetHeight - 8);
        changed = true;
      }
      if (rect.left < 8) {
        left = 8;
        changed = true;
      }
      if (rect.top < 8) {
        top = 8;
        changed = true;
      }
      if (changed) {
        exportPanel.style.left = `${left}px`;
        exportPanel.style.top = `${top}px`;
        exportPanel.style.right = 'auto';
      }
    }

    function openFile(file) {
      if (!file.type.startsWith("image/")) {
        message.textContent = "画像ファイルを選択してください。";
        return;
      }

      const blobUrl = URL.createObjectURL(file);
      loadTexture(blobUrl, file.name, true);
    }

    function loadTexture(src, label, revokeAfterLoad = false) {
      const loader = new THREE.TextureLoader();
      loader.load(
        src,
        (texture) => {
          texture.colorSpace = THREE.SRGBColorSpace;
          texture.minFilter = THREE.LinearFilter;
          texture.magFilter = THREE.LinearFilter;

          if (material.map) {
            material.map.dispose();
          }
          material.map = texture;
          material.needsUpdate = true;

          currentImageLabel = label;
          currentImageWidth = texture.image?.naturalWidth || texture.image?.videoWidth || texture.image?.width || 0;
          currentImageHeight = texture.image?.naturalHeight || texture.image?.videoHeight || texture.image?.height || 0;
          updateExportInfo();
          updateStatus();

          if (revokeAfterLoad) {
            URL.revokeObjectURL(src);
          }
        },
        undefined,
        (error) => {
          message.textContent = "画像の読み込みに失敗しました。正距円筒画像か確認してください。";
          console.error(error);
          if (revokeAfterLoad) {
            URL.revokeObjectURL(src);
          }
        }
      );
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getNormalizedExportSettings() {
      const h = clamp(Number(hFovInput.value) || 0, 1, 179);
      const v = clamp(Number(vFovInput.value) || 0, 1, 179);
      hFovInput.value = String(h);
      vFovInput.value = String(v);
      return { hFov: h, vFov: v };
    }

    function getPerspectiveAspect(hFov, vFov) {
      const hRad = THREE.MathUtils.degToRad(hFov);
      const vRad = THREE.MathUtils.degToRad(vFov);
      return Math.tan(hRad / 2) / Math.tan(vRad / 2);
    }

    function getOutputDimensions(hFov, vFov) {
      if (!currentImageWidth || !currentImageHeight) {
        return { width: 0, height: 0, scale: 1, limited: false };
      }

      const pixelsPerDegree = Math.min(currentImageWidth / 360, currentImageHeight / 180);
      const aspect = getPerspectiveAspect(hFov, vFov);

      const rawHeight = Math.max(1, Math.round(vFov * pixelsPerDegree));
      const rawWidth = Math.max(1, Math.round(rawHeight * aspect));

      const maxEdge = 4096;
      const scale = Math.min(1, maxEdge / Math.max(rawWidth, rawHeight));

      return {
        width: Math.max(1, Math.round(rawWidth * scale)),
        height: Math.max(1, Math.round(rawHeight * scale)),
        scale,
        limited: scale < 1
      };
    }

    function updateCropFrameVisibility() {
      const visible = showFrameInput.checked;
      cropOverlay.style.display = visible ? 'block' : 'none';
    }

    function updateExportInfo() {
      const { hFov, vFov } = getNormalizedExportSettings();
      const dims = getOutputDimensions(hFov, vFov);

      if (!dims.width || !dims.height) {
        exportSize.textContent = "保存サイズ: -";
        updateCropFrame();
        return;
      }

      let text = `保存サイズ: ${dims.width} x ${dims.height} px`;
      if (dims.limited) {
        text += " (大きすぎるため縮小)";
      }
      exportSize.textContent = text;
      updateCropFrame();
    }


    function getCurrentHorizontalFov() {
      const vRad = THREE.MathUtils.degToRad(fov);
      return THREE.MathUtils.radToDeg(2 * Math.atan(Math.tan(vRad / 2) * camera.aspect));
    }

    function updateCropFrame() {
      if (!camera) return;

      const { hFov, vFov } = getNormalizedExportSettings();
      const currentHFov = getCurrentHorizontalFov();
      const currentVFov = fov;

      const widthRatio = Math.tan(THREE.MathUtils.degToRad(hFov / 2)) /
        Math.tan(THREE.MathUtils.degToRad(currentHFov / 2));
      const heightRatio = Math.tan(THREE.MathUtils.degToRad(vFov / 2)) /
        Math.tan(THREE.MathUtils.degToRad(currentVFov / 2));

      const safeWidthRatio = Math.max(0.02, widthRatio);
      const safeHeightRatio = Math.max(0.02, heightRatio);
      const frameWidth = Math.max(16, Math.min(window.innerWidth, window.innerWidth * safeWidthRatio));
      const frameHeight = Math.max(16, Math.min(window.innerHeight, window.innerHeight * safeHeightRatio));
      const clipped = widthRatio > 1 || heightRatio > 1;

      cropFrame.style.width = `${frameWidth}px`;
      cropFrame.style.height = `${frameHeight}px`;
      cropOverlay.style.setProperty('--frame-half-height', `${frameHeight / 2}px`);
      cropFrame.style.borderColor = clipped ? 'rgba(255, 200, 120, 0.95)' : 'rgba(255, 255, 255, 0.92)';
      cropLabel.textContent = clipped
        ? `保存範囲 H ${hFov}° / V ${vFov}° (表示より広い)`
        : `保存範囲 H ${hFov}° / V ${vFov}°`;
      updateCropFrameVisibility();
    }

    function updateStatus(extra = "") {
      const direction = `向き: 水平 ${normalizeAngle(lon).toFixed(1)}° / 垂直 ${clamp(lat, -85, 85).toFixed(1)}°`;
      const imageInfo = currentImageWidth && currentImageHeight
        ? `${currentImageLabel} (${currentImageWidth} x ${currentImageHeight})`
        : currentImageLabel;
      message.textContent = `現在の画像: ${imageInfo}\n${direction}${extra ? `\n${extra}` : ""}`;
    }

    function normalizeAngle(angle) {
      let value = angle % 360;
      if (value < 0) value += 360;
      return value;
    }

    function applyLook(targetCamera, targetLon, targetLat) {
      const limitedLat = clamp(targetLat, -85, 85);
      const phi = THREE.MathUtils.degToRad(90 - limitedLat);
      const theta = THREE.MathUtils.degToRad(targetLon + 180);

      const x = 500 * Math.sin(phi) * Math.cos(theta);
      const y = 500 * Math.cos(phi);
      const z = 500 * Math.sin(phi) * Math.sin(theta);
      targetCamera.lookAt(x, y, z);
    }


    async function renderViewToBlob(width, height, targetLon, targetLat, hFov, vFov) {
      const aspect = getPerspectiveAspect(hFov, vFov);

      let tempRenderer;
      try {
        const exportCamera = new THREE.PerspectiveCamera(vFov, aspect, 1, 1100);
        applyLook(exportCamera, targetLon, targetLat);

        tempRenderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        tempRenderer.setPixelRatio(1);
        tempRenderer.setSize(width, height, false);
        tempRenderer.outputColorSpace = THREE.SRGBColorSpace;
        tempRenderer.render(scene, exportCamera);

        const blob = await new Promise((resolve) => {
          tempRenderer.domElement.toBlob(resolve, "image/png");
        });

        if (!blob) {
          throw new Error("PNG生成に失敗しました。");
        }
        return blob;
      } finally {
        if (tempRenderer) {
          tempRenderer.dispose();
        }
      }
    }

    async function renderViewToCanvas(width, height, targetLon, targetLat, hFov, vFov) {
      const blob = await renderViewToBlob(width, height, targetLon, targetLat, hFov, vFov);
      const bitmap = await createImageBitmap(blob);
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(bitmap, 0, 0);
      bitmap.close();
      return canvas;
    }

    async function renderDirectionToBlob(width, height, direction, upVector, hFov, vFov) {
      const aspect = getPerspectiveAspect(hFov, vFov);

      let tempRenderer;
      try {
        const exportCamera = new THREE.PerspectiveCamera(vFov, aspect, 1, 1100);
        exportCamera.position.set(0, 0, 0);
        exportCamera.up.copy(upVector).normalize();
        exportCamera.lookAt(direction.clone().normalize());

        tempRenderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        tempRenderer.setPixelRatio(1);
        tempRenderer.setSize(width, height, false);
        tempRenderer.outputColorSpace = THREE.SRGBColorSpace;
        tempRenderer.render(scene, exportCamera);

        const blob = await new Promise((resolve) => {
          tempRenderer.domElement.toBlob(resolve, "image/png");
        });

        if (!blob) {
          throw new Error("PNG生成に失敗しました。");
        }
        return blob;
      } finally {
        if (tempRenderer) {
          tempRenderer.dispose();
        }
      }
    }

    async function renderDirectionToCanvas(width, height, direction, upVector, hFov, vFov) {
      const blob = await renderDirectionToBlob(width, height, direction, upVector, hFov, vFov);
      const bitmap = await createImageBitmap(blob);
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(bitmap, 0, 0);
      bitmap.close();
      return canvas;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function getCurrentViewBasis() {
      applyLook(camera, lon, lat);

      const forward = new THREE.Vector3();
      camera.getWorldDirection(forward);

      const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion).normalize();
      const up = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion).normalize();

      return { forward, right, up };
    }

    function getCubeFaces() {
      const yaw = normalizeAngle(lon);
      const pitch = clamp(lat, -85, 85);
      const basis = getCurrentViewBasis();

      return {
        yaw,
        pitch,
        faces: {
          front: { dir: basis.forward.clone(), up: basis.up.clone() },
          right: { dir: basis.right.clone(), up: basis.up.clone() },
          back: { dir: basis.forward.clone().multiplyScalar(-1), up: basis.up.clone() },
          left: { dir: basis.right.clone().multiplyScalar(-1), up: basis.up.clone() },
          up: { dir: basis.up.clone(), up: basis.forward.clone().multiplyScalar(-1) },
          down: { dir: basis.up.clone().multiplyScalar(-1), up: basis.forward.clone() }
        }
      };
    }

    async function saveCurrentViewAsPng() {
      if (!material.map) {
        updateStatus("画像がまだ読み込まれていません。");
        return;
      }

      const { hFov, vFov } = getNormalizedExportSettings();
      const dims = getOutputDimensions(hFov, vFov);
      if (!dims.width || !dims.height) {
        updateStatus("保存サイズを計算できませんでした。");
        return;
      }

      savePngBtn.disabled = true;
      saveCubeBtn.disabled = true;
      saveCubeCrossBtn.disabled = true;
      updateStatus(`PNGを書き出し中... ${dims.width} x ${dims.height}px`);

      try {
        const blob = await renderViewToBlob(dims.width, dims.height, lon, lat, hFov, vFov);
        downloadBlob(blob, buildExportFileName(hFov, vFov));

        const limitNote = dims.limited ? " / 大きすぎるため縮小保存" : "";
        updateStatus(`PNG保存完了: ${dims.width} x ${dims.height}px / H ${hFov}° / V ${vFov}°${limitNote}`);
      } catch (error) {
        console.error(error);
        updateStatus("PNG保存に失敗しました。");
      } finally {
        savePngBtn.disabled = false;
        saveCubeBtn.disabled = false;
        saveCubeCrossBtn.disabled = false;
      }
    }


    async function saveCubeMap() {
      if (!material.map) {
        updateStatus("画像がまだ読み込まれていません。");
        return;
      }

      const cubeFaceFov = 90;
      const sourceFaceSize = currentImageWidth ? Math.max(1, Math.round(currentImageWidth / 4)) : 1024;
      const faceSize = Math.min(2048, sourceFaceSize);
      const { yaw, pitch, faces } = getCubeFaces();

      savePngBtn.disabled = true;
      saveCubeBtn.disabled = true;
      saveCubeCrossBtn.disabled = true;
      updateStatus(`Cube-mapを書き出し中... ${faceSize} x ${faceSize}px x 6面`);

      try {
        for (const [name, pose] of Object.entries(faces)) {
          const blob = await renderDirectionToBlob(faceSize, faceSize, pose.dir, pose.up, cubeFaceFov, cubeFaceFov);
          downloadBlob(blob, buildCubeFaceFileName(name, faceSize));
        }
        updateStatus(`Cube-map保存完了: ${faceSize} x ${faceSize}px x 6面 / 基準向き 水平 ${yaw.toFixed(1)}° / 垂直 ${pitch.toFixed(1)}°`);
      } catch (error) {
        console.error(error);
        updateStatus("Cube-map保存に失敗しました。");
      } finally {
        savePngBtn.disabled = false;
        saveCubeBtn.disabled = false;
        saveCubeCrossBtn.disabled = false;
      }
    }

    async function saveCubeCrossMap() {
      if (!material.map) {
        updateStatus("画像がまだ読み込まれていません。");
        return;
      }

      const cubeFaceFov = 90;
      const sourceFaceSize = currentImageWidth ? Math.max(1, Math.round(currentImageWidth / 4)) : 1024;
      const faceSize = Math.min(1536, sourceFaceSize);
      const { yaw, pitch, faces } = getCubeFaces();

      savePngBtn.disabled = true;
      saveCubeBtn.disabled = true;
      saveCubeCrossBtn.disabled = true;
      updateStatus(`Cube-map展開図を書き出し中... 面 ${faceSize} x ${faceSize}px`);

      try {
        const rendered = {};
        for (const [name, pose] of Object.entries(faces)) {
          rendered[name] = await renderDirectionToCanvas(faceSize, faceSize, pose.dir, pose.up, cubeFaceFov, cubeFaceFov);
        }

        const canvas = document.createElement("canvas");
        canvas.width = faceSize * 4;
        canvas.height = faceSize * 3;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.drawImage(rendered.left, 0, faceSize);
        ctx.drawImage(rendered.front, faceSize, faceSize);
        ctx.drawImage(rendered.right, faceSize * 2, faceSize);
        ctx.drawImage(rendered.back, faceSize * 3, faceSize);
        ctx.drawImage(rendered.up, faceSize, 0);
        ctx.drawImage(rendered.down, faceSize, faceSize * 2);

        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
        if (!blob) {
          throw new Error("展開図PNG生成に失敗しました。");
        }
        downloadBlob(blob, buildCubeCrossFileName(faceSize));

        updateStatus(`Cube-map展開図保存完了: ${canvas.width} x ${canvas.height}px / 面 ${faceSize}px / 基準向き 水平 ${yaw.toFixed(1)}° / 垂直 ${pitch.toFixed(1)}°`);
      } catch (error) {
        console.error(error);
        updateStatus("Cube-map展開図保存に失敗しました。");
      } finally {
        savePngBtn.disabled = false;
        saveCubeBtn.disabled = false;
        saveCubeCrossBtn.disabled = false;
      }
    }

    function buildCubeFaceFileName(faceSuffix, faceSize) {
      const base = currentImageLabel.replace(/\.[^.]+$/, "").replace(/[^a-zA-Z0-9\u3040-\u30ff\u3400-\u9fff_-]+/g, "_") || "panorama";
      const yaw = Math.round(normalizeAngle(lon));
      const pitch = Math.round(clamp(lat, -85, 85));
      return `${base}_cubemap_${faceSuffix}_${faceSize}px_yaw${yaw}_pitch${pitch}.png`;
    }

    function buildCubeCrossFileName(faceSize) {
      const base = currentImageLabel.replace(/\.[^.]+$/, "").replace(/[^a-zA-Z0-9\u3040-\u30ff\u3400-\u9fff_-]+/g, "_") || "panorama";
      const yaw = Math.round(normalizeAngle(lon));
      const pitch = Math.round(clamp(lat, -85, 85));
      return `${base}_cubemap_cross_${faceSize}px_yaw${yaw}_pitch${pitch}.png`;
    }

    function buildExportFileName(hFov, vFov) {
      const base = currentImageLabel.replace(/\.[^.]+$/, "").replace(/[^a-zA-Z0-9\u3040-\u30ff\u3400-\u9fff_-]+/g, "_") || "panorama";
      const yaw = Math.round(normalizeAngle(lon));
      const pitch = Math.round(clamp(lat, -85, 85));
      return `${base}_yaw${yaw}_pitch${pitch}_h${Math.round(hFov)}_v${Math.round(vFov)}.png`;
    }

    function animate() {
      requestAnimationFrame(animate);
      update();
    }

    function update() {
      lat = clamp(lat, -85, 85);
      applyLook(camera, lon, lat);
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
